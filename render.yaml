services:
  - type: web
    name: complaint-management-system
    runtime: python
    repo: https://github.com/rajasree-ai/complaint-management-system
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: complaint-db
          property: connectionString

databases:
  - name: complaint-db
    databaseName: complaint_db
    user: complaint_user